<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Ready to hit the rapids? Get in touch with our team for bookings, customized group trips, and safety information. Start your rafting journey with us here.">
    <meta name="author" content="Pedro Henrique Cordeiro de Lacerda Ribeiro">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us | White Water Rafting</title>
</head>

<body>
    <header class="contact">
        <img src="images/z-wwr-crossedoars-logo.png"
          alt="Whitewater Rafting vintage logo featuring a raft with people and crossed paddles.">
        <nav>
            <a class="a1" href="index.html">Home</a>
            <a class="a2" href="about.html">About Us</a>
            <a class="a3" href="trips.html">Trips</a>
            <a class="a4" href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main class="contact">
        <div class="companyinfo">
            <h1>White Water Rafting Company</h1>
            <div class="adress">
                <h2>123 Main River Street</h2>
                <h2>Kolob, California</h2>
                <h2>+1 999 999 9999</h2>
                <h2>info@whitewater.com</h2>
            </div>
        </div>
        <div class="googlemaps">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d590288.722019501!2d-43.777979224031675!3d-13.602694976915384!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x75a2dc6816e7ef3%3A0xedc9085505deb718!2sRio%20S%C3%A3o%20Francisco!5e0!3m2!1spt-BR!2sbr!4v1775312318638!5m2!1spt-BR!2sbr"
              allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <div class="forms">
            <form class="box">
                <div class="form-item name">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Type your name here">
                </div>
                <div class="form-item email">
                    <label for="mail">Email</label>
                    <input type="text" id="mail" name="mail" placeholder="Type your email here">
                </div>
                <div>
                    <div class="radiogroup">
                        <span>Message Purpose</span>
                        <input type="radio" id="general" name="purpose" value="general">
                        <label for="general">General Inquiry</label>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label>
                        <input type="radio" id="website" name="purpose" value="website">
                        <label for="website">Website Suggestion</label>
                    </div>

                </div>
                <div class="form-item  message-area">
                    <label for="message" class="label-message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>
                </div>
                <div class="chebox-area">
                    <input type="checkbox" id="subscribe" name="subscribe" checked>
                    <label for="subscribe">Please, subscribe me to the monthyly newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <div class="employee">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-img">
                <figure>
                    <img src="images/employee-1-new.jpg" alt="Employee 1 Picture">
                    <figcaption class="1"><strong>Pedro Henrique</strong> - Senior River Guide
                    </figcaption>
                </figure>
                <figure>
                    <img src="images/employee-2-new.jpg" alt="Employee 2 Picture">
                    <figcaption><strong>Pedro Lacerda</strong> - Safety Specialist</figcaption>
                </figure>
                <figure>
                    <img src="images/employee-3-new.jpg" alt="Employee 3 Picture">
                    <figcaption><strong>Pedro Ribeiro</strong> - Equipment Manager</figcaption>
                </figure>
            </div>
        </div>
    </main>
    <footer class="contact">
        <nav class="socialmedia">
            <p>©️ - 2026 - White Water Rafting - Pedro Henrique Cordeiro de Lacerda Ribeiro</p>
            <a class="a1" href="https://facebook.com">
                <img src="images/facebook_1384053.png" alt="Facebook Icon">
            </a>
            <a class="a2" href="https://linkedin.com">
                <img src="images/linkedin_3256016.png" alt="LinkedIn Icon">
            </a>
            <a class="a3" href="https://instagram.com">
                <img src="images/instagram_226252.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
